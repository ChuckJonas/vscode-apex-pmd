name: build

on:
  push:
    branches:
      - '**'
      # don't run on dependabot branches. Dependabot will create pull requests, which will then be run instead
      - '!dependabot/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Run Tests (MacOS, Windows)
        if: runner.os != 'Linux'
        run: npm test
      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: vscode-test-logs-${{ matrix.os }}
          path: .vscode-test/user-data/logs
      - name: Package extension
        if: runner.os == 'Linux'
        run: npm run vscode:package
      - name: Upload extension
        uses: actions/upload-artifact@v7
        if: runner.os == 'Linux'
        with:
          name: vscode-apex-pmd
          path: apex-pmd-*.vsix

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - name: Run eslint
        run: npm run lint

  prettier:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - name: Run prettier
        run: npm run prettier
      - name: Fail build if there are changes
        run: |
          git status
          git diff --quiet && git diff --cached --quiet || (echo "Workspace is dirty"; exit 1)
